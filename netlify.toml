[build]
  command = "npx expo export --platform web"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA redirect — todas las rutas van a index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html: sin caché (siempre fresco para ver el bundle nuevo)
[[headers]]
  for = "/index.html"
    [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# JS/CSS bundles: caché de 1 año (tienen hash en el nombre)
[[headers]]
  for = "/_expo/static/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Assets (imágenes, fuentes)
[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
